name: Publish to PyPI

# Publishes the package to PyPI when a version tag (vX.Y.Z) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no token stored in secrets. Configure the
# trusted publisher for project "cadbuildr-foundation" at https://pypi.org/manage/account/publishing/.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        run: uv python install 3.12
      - name: Build sdist + wheel
        run: uv build
      - name: Check the tag matches the package version
        run: |
          PKG_VERSION="$(python -c 'import tomllib; d=tomllib.load(open("pyproject.toml","rb")); print((d.get("project") or d["tool"]["poetry"])["version"])')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package=$PKG_VERSION tag=$TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package version $PKG_VERSION"; exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cadbuildr-foundation
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
